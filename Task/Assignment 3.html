<!DOCTYPE html>
<html>
<head>
    <title>Assignment 3 - Flexbox</title>
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px 20px;
        }

        .logo {
            color: white;
            font-size: 20px;
        }

        .menu a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MyLogo</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

</body>
</html>
