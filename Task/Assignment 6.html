<!DOCTYPE html>
<html>
<head>
    <title>Assignment 6 - Animation</title>
    <style>
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: blue;
            color: white;
            border: none;
            transition: background-color 0.3s;
            position: relative;
        }

        button:hover {
            background-color: green;
            animation: move 0.5s;
        }

        @keyframes move {
            from { left: 0; }
            to { left: 20px; }
        }
    </style>
</head>
<body>

    <button>Hover Me</button>

</body>
</html>
