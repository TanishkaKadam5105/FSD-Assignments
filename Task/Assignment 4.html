<!DOCTYPE html>
<html>
<head>
    <title>Assignment 4 - Grid</title>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .gallery div {
            background-color: lightgray;
            height: 180px;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
            overflow: hidden;
        }
        .gallery img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div><img src="img1.jpg"></div>
        <div><img src="img2.jpg"></div>
        <div><img src="img3.jpg"></div>
        <div><img src="img4.jpg"></div>
        <div><img src="img5.jpg"></div>
        <div><img src="img6.jpg"></div>
    </div>

</body>
</html>
