<!DOCTYPE html>
<html>
<head>
    <title>Assignment 1 - Basic CSS</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial;
        }

        h1 {
            color: darkblue;
        }

        .para {
            color: green;
            font-size: 16px;
        }

        #special {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Welcome to CSS</h1>

    <p class="para">This is a paragraph styled using class selector.</p>

    <p id="special">This paragraph is styled using ID selector.</p>

</body>
</html>
