<!DOCTYPE html>
<html>
<head>
    <title>Assignment 5 - Responsive Design</title>
    <style>
        body {
            font-family: Arial;
            background-color: white;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background-color: lightblue;
        }

        @media (max-width: 600px) {
            body {
                background-color: lightgray;
            }

            .container {
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Landing Page</h1>
        <p>This page adjusts based on screen size.</p>
    </div>

</body>
</html>
