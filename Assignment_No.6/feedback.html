<!DOCTYPE html>
<html>
<head>
    <title>Feedback Page</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            text-align:center;
        }

        .box{
            width:400px;
            margin:auto;
            margin-top:50px;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, textarea{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            background:green;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Give Feedback</h2>

    <form action="/submit-feedback" method="POST">

        <input type="text" name="name" placeholder="Enter Name" required>

        <input type="email" name="email" placeholder="Enter Email" required>

        <textarea name="message" rows="5" placeholder="Write Feedback" required></textarea>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
